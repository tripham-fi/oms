version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: oms-postgres
    restart: always
    environment:
      POSTGRES_DB: oms_db
      POSTGRES_USER: oms_user
      POSTGRES_PASSWORD: oms_password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oms-network

volumes:
  postgres_data:

networks:
  oms-network:
    driver: bridge